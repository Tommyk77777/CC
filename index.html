    '描述': '尖尾裸藻（学名：Euglena oxyuris）是三亚湾典型的植物，具有重要的生态价值，是海南微塑料毒性研究的关键物种之一。'
}
        ];
        let filteredData = [];
        let currentPage = 1;
        const PAGE_SIZE = 20;

        $(document).ready(function() {
            // 初始化数据
            filteredData = [...speciesData];
            
            // 渲染物种列表
            renderSpecies();

            // ====================== 渲染物种卡片 ======================
            function renderSpecies() {
                const container = $('#speciesList');
                container.empty();

                const start = (currentPage - 1) * PAGE_SIZE;
                const pageData = filteredData.slice(start, start + PAGE_SIZE);

                if (pageData.length === 0) {
                    container.append('<div class="col-xs-12 text-center py-5"><h4 class="text-muted">没有找到匹配的物种</h4></div>');
                    updateStats(0);
                    return;
                }

                pageData.forEach(item => {
                    const sheetLabel = {
                        'sheet1': 'Sheet1：淡水及河口鱼类',
                        'sheet2': 'Sheet2：海洋无脊椎动物',
                        'sheet3': 'Sheet3：红树林植物',
                        'sheet4': 'Sheet4：浮游生物'
                    }[item['数据来源Sheet']] || 'Sheet1';
                    
                    const html = `
                    <div class="col-md-4 col-sm-6">
                        <div class="species-card">
                            <div class="species-header">
                                <div class="row">
                                    <div class="col-xs-8">
                                        <div class="common-name">${item['中文名'] || '未知'}</div>
                                        <div class="scientific-name">${item['学名'] || ''}</div>
                                    </div>
                                    <div class="col-xs-4 text-right">
                                        <span class="badge badge-sheet">${item['数据来源Sheet'] || 'sheet1'}</span>
                                    </div>
                                </div>
                            </div>
                            <div class="species-body">
                                <div class="mb-2">
                                    <span class="badge badge-category">${item['生物类群'] || '鱼类'}</span>
                                    <span class="badge badge-habitat">${item['栖息区域'] || '三亚湾'}</span>
                                </div>
                                <p class="text-muted small">${item['描述'] || `序号：${item['序号']}　数据来自海南微塑料毒性数据库`}</p>
                            </div>
                            <div class="species-footer">
                                <div class="row">
                                    <div class="col-xs-6 text-left small text-muted">数据更新：2026-03</div>
                                    <div class="col-xs-6 text-right small text-primary">${item['生物类群'] || '鱼类'} | 生态系统</div>
                                </div>
                            </div>
                        </div>
                    </div>`;
                    container.append(html);
                });

                updateStats(filteredData.length);
                updatePagination();
            }

            // 更新统计信息
            function updateStats(total) {
                const start = total > 0 ? (currentPage - 1) * PAGE_SIZE + 1 : 0;
                const end = Math.min(start + PAGE_SIZE - 1, total);
                $('#totalCount').text(total);
                $('#displayStart').text(start);
                $('#displayEnd').text(end || 0);
                $('#totalPages').text(Math.ceil(total / PAGE_SIZE) || 1);
            }

            // 更新分页控件
            function updatePagination() {
                $('#pageJumpInput').val(currentPage);
                
                // 更新分页按钮状态
                const maxPage = Math.ceil(filteredData.length / PAGE_SIZE);
                $('.pagination li').removeClass('disabled active');
                
                // 上一页
                if (currentPage <= 1) {
                    $('.pagination li:first').addClass('disabled');
                }
                
                // 下一页
                if (currentPage >= maxPage) {
                    $('.pagination li:last').addClass('disabled');
                }
                
                // 当前页
                $(`.pagination li:eq(${currentPage})`).addClass('active');
            }

            // ====================== 检索功能 ======================
            $('#speciesSearchForm').submit(function(e) {
                e.preventDefault();

                const sci = $('#scientificName').val().trim().toLowerCase();
                const com = $('#commonName').val().trim().toLowerCase();
                const cat = $('#bioCategory').val();
                const area = $('#habitatArea').val();

                filteredData = speciesData.filter(item => {
                    const matchSci = !sci || (item['学名'] || '').toLowerCase().includes(sci);
                    const matchCom = !com || (item['中文名'] || '').toLowerCase().includes(com);
                    const matchCat = !cat || (item['生物类群'] || '') === cat;
                    const matchArea = !area || (item['栖息区域'] || '') === area;
                    return matchSci && matchCom && matchCat && matchArea;
                });

                currentPage = 1;
                renderSpecies();
            });

            // ====================== 筛选功能 ======================
            $('#filterCategory, #filterHabitat, #filterSheet').change(function() {
                const cat = $('#filterCategory').val();
                const hab = $('#filterHabitat').val();
                const sheet = $('#filterSheet').val();

                filteredData = speciesData.filter(item => {
                    const mCat = !cat || (item['生物类群'] || '') === cat;
                    const mHab = !hab || (item['栖息区域'] || '') === hab;
                    const mSheet = !sheet || (item['数据来源Sheet'] || 'sheet1') === sheet;
                    return mCat && mHab && mSheet;
                });

                currentPage = 1;
                renderSpecies();
            });

            // ====================== Sheet切换 ======================
            $('.sheet-tab button').click(function() {
                $('.sheet-tab button').removeClass('active');
                $(this).addClass('active');

                const sheetType = $(this).data('sheet');
                if (sheetType === 'all') {
                    filteredData = [...speciesData];
                } else {
                    filteredData = speciesData.filter(item => (item['数据来源Sheet'] || 'sheet1') === sheetType);
                }
                currentPage = 1;
                renderSpecies();
            });

            // ====================== 分页功能 ======================
            $('.pagination a').click(function(e) {
                e.preventDefault();
                const maxPage = Math.ceil(filteredData.length / PAGE_SIZE);

                if ($(this).parent().hasClass('disabled')) return;

                if ($(this).text() === '«' && currentPage > 1) {
                    currentPage--;
                } else if ($(this).text() === '»' && currentPage < maxPage) {
                    currentPage++;
                } else if (!isNaN(parseInt($(this).text()))) {
                    currentPage = parseInt($(this).text());
                }

                renderSpecies();
            });

            // 页码跳转
            $('#pageJumpBtn').click(function() {
                let target = parseInt($('#pageJumpInput').val());
                const max = Math.ceil(filteredData.length / PAGE_SIZE);
                
                if (isNaN(target) || target < 1 || target > max) {
                    alert(`请输入1-${max}之间的页码`);
                    $('#pageJumpInput').val(currentPage);
                    return;
                }
                
                currentPage = target;
                renderSpecies();
            });

            // 清空检索条件
            $('#clearSearch').click(function() {
                $('#speciesSearchForm')[0].reset();
                $('#filterCategory').val('');
                $('#filterHabitat').val('');
                $('#filterSheet').val('');
                $('.sheet-tab button:first').click();
            });
        });
    </script>
</body>
</html>
